spring.application.name=vagas

# MySQL — configure via environment variables or application-local.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vagas?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080
server.error.include-message=always

# Google OAuth2 — set via env vars or application-local.properties (gitignored)
# Dev: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:configure-in-application-local.properties}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:configure-in-application-local.properties}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT — override in application-local.properties or via JWT_SECRET env var
jwt.secret=${JWT_SECRET:vagas-condominio-secret-key-at-least-32-chars-long}
jwt.expiration-ms=86400000

# Frontend URL for OAuth2 redirect
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Admin bootstrap — creates first admin user on startup if no admins exist
# Set via env vars or application-local.properties (never commit credentials)
admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
